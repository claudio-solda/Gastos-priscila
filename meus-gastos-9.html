<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7C3AED">
<title>Gastos da Priscila</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --roxo: #7C3AED;
    --roxo-light: #EDE9FE;
    --roxo-mid: #A78BFA;
    --rosa: #EC4899;
    --verde: #10B981;
    --vermelho: #EF4444;
    --amarelo: #F59E0B;
    --cinza: #F3F4F6;
    --text: #1F2937;
    --text-soft: #6B7280;
    --white: #ffffff;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: #F5F3FF;
    color: var(--text);
    min-height: 100vh;
    max-width: 420px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #7C3AED, #A855F7);
    padding: 24px 20px 32px;
    color: white;
    border-radius: 0 0 28px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .app-name {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .month-selector {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .month-selector option { color: var(--text); background: white; }

  .total-label { font-size: 13px; opacity: 0.85; font-weight: 600; margin-bottom: 4px; }
  .total-value { font-size: 38px; font-weight: 900; letter-spacing: -1px; }

  .meta-bar-wrap { margin-top: 14px; }
  .meta-bar-info { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.9; font-weight: 700; margin-bottom: 6px; }
  .meta-bar-bg { background: rgba(255,255,255,0.25); border-radius: 10px; height: 8px; overflow: hidden; }
  .meta-bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 16px 20px 0;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    background: white;
    color: var(--text-soft);
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .tab.active {
    background: var(--roxo);
    color: white;
    box-shadow: 0 4px 12px rgba(124,58,237,0.3);
  }

  /* SECTIONS */
  .section { padding: 16px 20px; display: none; }
  .section.active { display: block; }

  /* CARDS CATEGORIAS */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .cat-card {
    background: white;
    border-radius: 16px;
    padding: 12px 8px;
    text-align: center;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .cat-card:active { transform: scale(0.95); }
  .cat-icon { font-size: 24px; margin-bottom: 4px; }
  .cat-name { font-size: 11px; font-weight: 700; color: var(--text-soft); }
  .cat-total { font-size: 13px; font-weight: 800; color: var(--text); }

  /* FORM ADICIONAR */
  .form-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 16px;
  }
  .form-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; color: var(--text); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--cinza);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: var(--cinza);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--roxo-mid);
    background: white;
  }
  .btn-add {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7C3AED, #A855F7);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(124,58,237,0.35);
    transition: transform 0.15s;
  }
  .btn-add:active { transform: scale(0.97); }

  /* META CONFIG */
  .meta-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 16px;
  }
  .meta-card h3 { font-size: 15px; font-weight: 800; margin-bottom: 12px; }

  /* LISTA GASTOS */
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .list-title { font-size: 16px; font-weight: 800; }
  .btn-clear {
    font-size: 12px;
    font-weight: 700;
    color: var(--vermelho);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
  }

  .gasto-item {
    background: white;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  .gasto-icon { font-size: 26px; width: 42px; text-align: center; flex-shrink: 0; }
  .gasto-info { flex: 1; }
  .gasto-desc { font-size: 14px; font-weight: 700; }
  .gasto-cat { font-size: 12px; color: var(--text-soft); font-weight: 600; }
  .gasto-data { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
  .gasto-valor { font-size: 16px; font-weight: 900; color: var(--vermelho); white-space: nowrap; }
  .btn-del { background: none; border: none; font-size: 18px; cursor: pointer; color: #D1D5DB; padding: 0 0 0 8px; }
  .btn-del:active { color: var(--vermelho); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-soft); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; font-weight: 600; }

  /* GRAFICO */
  .grafico-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 16px;
  }
  .grafico-title { font-size: 15px; font-weight: 800; margin-bottom: 16px; }
  .bar-item { margin-bottom: 14px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
  .bar-bg { background: var(--cinza); border-radius: 8px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 8px; transition: width 0.6s ease; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1F2937;
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .resumo-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .resumo-card { background: white; border-radius: 16px; padding: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  .resumo-card .r-label { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .resumo-card .r-valor { font-size: 20px; font-weight: 900; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="app-name">💜 Gastos da Priscila</div>
    <select class="month-selector" id="mesSelect" onchange="trocarMes()"></select>
  </div>
  <div class="total-label">Gasto total do mês</div>
  <div class="total-value" id="totalGeral">R$ 0,00</div>
  <div class="meta-bar-wrap" id="metaBarWrap">
    <div class="meta-bar-info">
      <span id="metaTexto">Meta: R$ 0,00</span>
      <span id="metaPct">0%</span>
    </div>
    <div class="meta-bar-bg">
      <div class="meta-bar-fill" id="metaFill" style="width:0%;background:#A78BFA"></div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="mudarTab('inicio')">🏠 Início</button>
  <button class="tab" onclick="mudarTab('adicionar')">➕ Adicionar</button>
  <button class="tab" onclick="mudarTab('grafico')">📊 Gráfico</button>
</div>

<!-- INICIO -->
<div class="section active" id="tab-inicio">
  <div class="resumo-cards">
    <div class="resumo-card">
      <div class="r-label">Qtd. lançamentos</div>
      <div class="r-valor" id="qtdLanc" style="color:var(--roxo)">0</div>
    </div>
    <div class="resumo-card">
      <div class="r-label">Maior gasto</div>
      <div class="r-valor" id="maiorGasto" style="color:var(--rosa)">R$ 0,00</div>
    </div>
  </div>

  <div style="margin-bottom:12px">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px">Por categoria</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <div>
    <div class="list-header">
      <div class="list-title">Últimos gastos</div>
      <button class="btn-clear" onclick="limparTudo()">Limpar tudo</button>
    </div>
    <div id="listaGastos"></div>
  </div>
</div>

<!-- ADICIONAR -->
<div class="section" id="tab-adicionar">
  <div class="form-card">
    <div class="form-title">Novo gasto</div>
    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="descInput" placeholder="Ex: Mercado, Conta de luz...">
    </div>
    <div class="form-group">
      <label>Valor (R$)</label>
      <input type="number" id="valorInput" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="catInput">
        <option value="Alimentação">🛒 Alimentação</option>
        <option value="Contas">💡 Contas (luz, água, etc)</option>
        <option value="Transporte">🚌 Transporte</option>
        <option value="Saúde">💊 Saúde</option>
        <option value="Educação">📚 Educação</option>
        <option value="Roupa">👗 Roupa</option>
        <option value="Lazer">🎉 Lazer</option>
        <option value="Beleza">💅 Beleza</option>
        <option value="Mercado">🏪 Mercado</option>
        <option value="Outros">📦 Outros</option>
      </select>
    </div>
    <div class="form-group">
      <label>Data</label>
      <input type="date" id="dataInput">
    </div>
    <button class="btn-add" onclick="adicionarGasto()">Adicionar gasto</button>
  </div>

  <div class="meta-card">
    <h3>🎯 Meta mensal de gastos</h3>
    <div class="form-group">
      <label>Limite do mês (R$)</label>
      <input type="number" id="metaInput" placeholder="Ex: 2000" inputmode="decimal">
    </div>
    <button class="btn-add" onclick="salvarMeta()" style="background:linear-gradient(135deg,#EC4899,#F472B6);box-shadow:0 4px 14px rgba(236,72,153,0.35)">Salvar meta</button>
  </div>
</div>

<!-- GRAFICO -->
<div class="section" id="tab-grafico">
  <div class="grafico-card">
    <div class="grafico-title">📊 Gastos por categoria</div>
    <div id="graficoBars"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- RODAPÉ -->
<div style="text-align:center;padding:28px 20px 36px;margin-top:8px">
  <div style="display:inline-block;background:white;border-radius:20px;padding:16px 24px;box-shadow:0 2px 12px rgba(124,58,237,0.1)">
    <div style="font-size:20px;margin-bottom:6px">💜</div>
    <div style="font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px">Criado com amor por</div>
    <div style="font-size:18px;font-weight:900;color:#7C3AED;margin-top:2px">Claudio</div>
    <div style="font-size:11px;font-weight:600;color:#C4B5FD;margin-top:2px">feito especialmente pra você 🌸</div>
  </div>
</div>

<script>
const CORES_CAT = {
  'Alimentação': '#F59E0B',
  'Contas': '#3B82F6',
  'Transporte': '#10B981',
  'Saúde': '#EF4444',
  'Educação': '#8B5CF6',
  'Roupa': '#EC4899',
  'Lazer': '#F97316',
  'Beleza': '#A855F7',
  'Mercado': '#14B8A6',
  'Outros': '#6B7280'
};

const ICONES_CAT = {
  'Alimentação': '🛒', 'Contas': '💡', 'Transporte': '🚌', 'Saúde': '💊',
  'Educação': '📚', 'Roupa': '👗', 'Lazer': '🎉', 'Beleza': '💅',
  'Mercado': '🏪', 'Outros': '📦'
};

let mesSelecionado = '';
let gastos = JSON.parse(localStorage.getItem('mg_gastos') || '[]');
let metas = JSON.parse(localStorage.getItem('mg_metas') || '{}');

function iniciarMeses() {
  const sel = document.getElementById('mesSelect');
  const hoje = new Date();
  const nomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  for (let i = 0; i < 6; i++) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = `${nomes[d.getMonth()]}/${d.getFullYear()}`;
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = label;
    sel.appendChild(opt);
  }
  mesSelecionado = sel.value;
  // Set data padrão
  document.getElementById('dataInput').value = hoje.toISOString().split('T')[0];
  // Meta
  if (metas[mesSelecionado]) document.getElementById('metaInput').value = metas[mesSelecionado];
}

function trocarMes() {
  mesSelecionado = document.getElementById('mesSelect').value;
  if (metas[mesSelecionado]) document.getElementById('metaInput').value = metas[mesSelecionado];
  else document.getElementById('metaInput').value = '';
  renderizar();
}

function gastosMes() {
  return gastos.filter(g => g.data && g.data.startsWith(mesSelecionado));
}

function totalMes() {
  return gastosMes().reduce((s, g) => s + g.valor, 0);
}

function formatarReal(v) {
  return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function renderizar() {
  const lista = gastosMes();
  const total = totalMes();
  const meta = metas[mesSelecionado] || 0;

  document.getElementById('totalGeral').textContent = formatarReal(total);
  document.getElementById('qtdLanc').textContent = lista.length;

  const maior = lista.length ? Math.max(...lista.map(g => g.valor)) : 0;
  document.getElementById('maiorGasto').textContent = formatarReal(maior);

  // Meta bar
  if (meta > 0) {
    const pct = Math.min(100, Math.round((total / meta) * 100));
    document.getElementById('metaTexto').textContent = `Meta: ${formatarReal(meta)}`;
    document.getElementById('metaPct').textContent = `${pct}%`;
    const cor = pct >= 100 ? '#EF4444' : pct >= 80 ? '#F59E0B' : '#A78BFA';
    document.getElementById('metaFill').style.width = pct + '%';
    document.getElementById('metaFill').style.background = cor;
    document.getElementById('metaBarWrap').style.display = 'block';
  } else {
    document.getElementById('metaBarWrap').style.display = 'none';
  }

  // Por categoria
  const porCat = {};
  lista.forEach(g => { porCat[g.categoria] = (porCat[g.categoria] || 0) + g.valor; });
  const catGrid = document.getElementById('catGrid');
  catGrid.innerHTML = '';
  Object.entries(porCat).sort((a,b)=>b[1]-a[1]).forEach(([cat, val]) => {
    catGrid.innerHTML += `
      <div class="cat-card">
        <div class="cat-icon">${ICONES_CAT[cat]||'📦'}</div>
        <div class="cat-name">${cat}</div>
        <div class="cat-total" style="color:${CORES_CAT[cat]||'#6B7280'}">${formatarReal(val)}</div>
      </div>`;
  });
  if (!Object.keys(porCat).length) catGrid.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:16px;color:#9CA3AF;font-size:13px;font-weight:700">Nenhum gasto este mês</div>';

  // Lista
  const listaEl = document.getElementById('listaGastos');
  const ordenada = [...lista].sort((a,b) => new Date(b.data) - new Date(a.data));
  if (!ordenada.length) {
    listaEl.innerHTML = `<div class="empty-state"><div class="emoji">💸</div><p>Nenhum gasto lançado<br>neste mês ainda!</p></div>`;
  } else {
    listaEl.innerHTML = ordenada.map(g => `
      <div class="gasto-item">
        <div class="gasto-icon">${ICONES_CAT[g.categoria]||'📦'}</div>
        <div class="gasto-info">
          <div class="gasto-desc">${g.descricao}</div>
          <div class="gasto-cat">${g.categoria}</div>
          <div class="gasto-data">${formatarData(g.data)}</div>
        </div>
        <div class="gasto-valor">${formatarReal(g.valor)}</div>
        <button class="btn-del" onclick="deletarGasto('${g.id}')">✕</button>
      </div>`).join('');
  }

  // Gráfico
  const graficoBars = document.getElementById('graficoBars');
  if (!Object.keys(porCat).length) {
    graficoBars.innerHTML = `<div class="empty-state"><div class="emoji">📊</div><p>Adicione gastos para<br>ver o gráfico!</p></div>`;
  } else {
    const maxVal = Math.max(...Object.values(porCat));
    graficoBars.innerHTML = Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([cat, val]) => `
      <div class="bar-item">
        <div class="bar-label">
          <span>${ICONES_CAT[cat]} ${cat}</span>
          <span style="color:${CORES_CAT[cat]||'#6B7280'}">${formatarReal(val)}</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${Math.round((val/maxVal)*100)}%;background:${CORES_CAT[cat]||'#6B7280'}"></div>
        </div>
      </div>`).join('');
  }
}

function formatarData(d) {
  if (!d) return '';
  const [y, m, dia] = d.split('-');
  return `${dia}/${m}/${y}`;
}

function adicionarGasto() {
  const desc = document.getElementById('descInput').value.trim();
  const valor = parseFloat(document.getElementById('valorInput').value);
  const cat = document.getElementById('catInput').value;
  const data = document.getElementById('dataInput').value;

  if (!desc) { mostrarToast('⚠️ Coloca a descrição!'); return; }
  if (!valor || valor <= 0) { mostrarToast('⚠️ Coloca o valor!'); return; }
  if (!data) { mostrarToast('⚠️ Escolhe a data!'); return; }

  const novo = { id: Date.now().toString(), descricao: desc, valor, categoria: cat, data };
  gastos.push(novo);
  salvarGastos();
  document.getElementById('descInput').value = '';
  document.getElementById('valorInput').value = '';
  mostrarToast('✅ Gasto adicionado!');
  mudarTab('inicio');
}

function deletarGasto(id) {
  if (!confirm('Remover este gasto?')) return;
  gastos = gastos.filter(g => g.id !== id);
  salvarGastos();
  mostrarToast('🗑️ Removido!');
}

function limparTudo() {
  if (!confirm('Apagar TODOS os gastos deste mês?')) return;
  gastos = gastos.filter(g => !g.data.startsWith(mesSelecionado));
  salvarGastos();
  mostrarToast('🗑️ Tudo limpo!');
}

function salvarMeta() {
  const val = parseFloat(document.getElementById('metaInput').value);
  if (!val || val <= 0) { mostrarToast('⚠️ Coloca o valor da meta!'); return; }
  metas[mesSelecionado] = val;
  localStorage.setItem('mg_metas', JSON.stringify(metas));
  renderizar();
  mostrarToast('🎯 Meta salva!');
}

function salvarGastos() {
  localStorage.setItem('mg_gastos', JSON.stringify(gastos));
  renderizar();
}

function mudarTab(nome) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+nome).classList.add('active');
  const idx = ['inicio','adicionar','grafico'].indexOf(nome);
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

iniciarMeses();
renderizar();
</script>
